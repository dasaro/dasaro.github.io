# Research software and datasets (github.com/dasaro). Research-grade only.
software:
  - name: "PEC"
    description: "Probabilistic Event Calculus — reference implementation."
    url: "https://github.com/dasaro/pec"
  - name: "k-lingo"
    description: "Depth-bounded (k-depth) version of the ASP solver clingo (KR 2021)."
    url: "https://github.com/dasaro/klingo"
  - name: "WABA Playground"
    description: "In-browser Weighted Assumption-Based Argumentation (clingo-wasm)."
    url: "https://github.com/dasaro/waba-playground"
  - name: "ArgLAS"
    description: "Learning ASP encodings of argumentation semantics with ILASP."
    url: "https://github.com/dasaro/ArgLAS"
  - name: "tptnd-lean"
    description: "Typed natural deduction in Lean 4 — machine-checked fairness certificates."
    url: "https://github.com/dasaro/tptnd-lean"
  - name: "LogicBenchmarkQuestions"
    description: "Dataset of logic puzzles to benchmark LLM reasoning."
    url: "https://github.com/dasaro/LogicBenchmarkQuestions"

