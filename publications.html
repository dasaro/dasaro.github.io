<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Permissions-Policy" content="interest-cohort=()">
  <meta name="description" content="Publications by Fabio Aurelio D'Asaro - Research papers, journals, conferences, and workshops in Logic and AI.">
  <meta name="author" content="Fabio Aurelio D'Asaro">

  <title>Publications - Fabio Aurelio D'Asaro</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

</head>
<body class="enable-back-to-top" data-page="publications">
  <!-- Mathematical Background Canvas -->
  <canvas id="bg-animation-canvas" data-default-animation="primes"></canvas>
  <button id="animation-toggle" class="animation-toggle" aria-label="Toggle background animation" title="Toggle animation (A)">
    <span class="symbol">∀</span>
  </button>

  <!-- Navigation (dynamically injected by navigation.js) -->
  <div id="nav-placeholder"></div>

  <!-- Main Content -->
  <main>
    <section id="publications">
      <div class="container">
        <h1 class="fade-in">Publications</h1>

        <!-- Scholar Metrics -->
        <div class="card metrics-widget fade-in-delay-1">
          <h3>Google Scholar Metrics</h3>
          <div class="metrics-grid grid grid-3">
            <div class="metric">
              <div class="metric-value" id="pub-citations">—</div>
              <div class="metric-label">Citations</div>
            </div>
            <div class="metric">
              <div class="metric-value" id="pub-h-index">—</div>
              <div class="metric-label">h-index</div>
            </div>
            <div class="metric">
              <div class="metric-value" id="pub-i10-index">—</div>
              <div class="metric-label">i10-index</div>
            </div>
          </div>
          <p class="metric-note" id="pub-metrics-updated">Last updated: —</p>
        </div>

        <!-- Filter Controls -->
        <div class="search-filter-container fade-in-delay-2">
          <!-- Search Bar -->
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search by title, author, or venue..."
          >

          <!-- Filter Dropdowns -->
          <div class="filters">
            <div class="select-container">
              <label for="topic-filter">Topic</label>
              <select id="topic-filter" class="filter-select">
                <option value="all">All Publications</option>
                <option value="selected">Selected Publications</option>
                <!-- Other topics populated dynamically -->
              </select>
            </div>

            <div class="select-container">
              <label for="year-filter">Year</label>
              <select id="year-filter" class="filter-select">
                <option value="all">All Years</option>
                <!-- Populated dynamically -->
              </select>
            </div>

            <div class="select-container">
              <label for="type-filter">Type</label>
              <select id="type-filter" class="filter-select">
                <option value="all">All Types</option>
                <option value="journal">Journal</option>
                <option value="conference">Conference</option>
                <option value="workshop">Workshop</option>
                <option value="book">Book Chapter</option>
              </select>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="filter-actions">
            <button class="btn btn-secondary" id="reset-filters">Reset Filters</button>
            <button class="btn btn-primary" id="export-bibtex">Export BibTeX</button>
          </div>
        </div>

        <!-- Publications Count -->
        <div id="publications-count" class="publications-count">
          <p class="loading-message">Loading publications...</p>
        </div>

        <!-- Unified Publications Container -->
        <div id="publications-container">
          <p class="loading-message">Loading publications...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="footer-text">
        <p>&copy; <span class="footer-year">2025</span> <span id="footer-name">Loading...</span></p>
        <p>∀x (Logic(x) → Elegant(x))</p>
      </div>
      <ul class="footer-links">
        <li><a href="https://github.com/dasaro" target="_blank" rel="noopener" id="footer-github">GitHub</a></li>
        <li><a href="https://scholar.google.com" target="_blank" rel="noopener" id="footer-scholar">Google Scholar</a></li>
        <li><a href="https://orcid.org" target="_blank" rel="noopener" id="footer-orcid">ORCID</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </footer>

  <!-- BibTeX Modal -->
  <div id="bibtex-modal" class="modal" hidden aria-hidden="true">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>BibTeX Citation</h3>
        <button class="modal-close" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body">
        <pre><code id="bibtex-content" class="bibtex-code"></code></pre>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary copy-btn" id="copy-bibtex">
          <span class="btn-icon">📋</span> Copy to Clipboard
        </button>
        <button class="btn btn-primary" id="download-bibtex">
          <span class="btn-icon">⬇</span> Download .bib File
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
    <script src="js/navigation.js?v=31"></script>
  <script src="js/main.js?v=31"></script>
  <script type="module" src="js/animations/AnimationController.js?v=31"></script>
  <script src="js/logical-symbols.js?v=31"></script>
  <script type="module" src="js/publications.js?v=33"></script>
</body>
</html>
